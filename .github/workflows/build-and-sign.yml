name: Auto-Build and Sign Native Android App

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Restore original Gradle files from backup
        run: |
          echo "Overwriting any accidental AI Studio modifications with pristine backups..."

          # 1. Restore root level configuration files
          cp actions-backup/build.gradle.kts ./build.gradle.kts
          cp actions-backup/settings.gradle.kts ./settings.gradle.kts
          cp actions-backup/gradle.properties ./gradle.properties
          cp actions-backup/gradlew ./gradlew

          # 2. Restore the gradle wrapper files
          cp -r actions-backup/gradle/. ./gradle/

          # 3. Restore the app-level build configuration safely (keeps your UI code intact)
          cp actions-backup/app/build.gradle.kts ./app/build.gradle.kts 2>/dev/null || true

          # 4. Fix permissions just in case the executable bit was dropped
          chmod +x gradlew

      - name: Set up Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # Configures Gradle for the workflow
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # Runs the build using the Gradle wrapper
      - name: Build Native Release APK
        run: ./gradlew assembleRelease --no-configuration-cache

      - name: Install Android Build Tools 29.0.3
        run: /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager "build-tools;29.0.3" --sdk_root=/usr/local/lib/android/sdk

      - name: Sign Android APK
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.KEYSTORE_BASE64 }}
          alias: ${{ secrets.RELEASE_ALIAS }}
          keyStorePassword: ${{ secrets.RELEASE_SIGNING_PASSWORD }}
          keyPassword: ${{ secrets.RELEASE_KEY_PASSWORD }}

      - name: Upload Signed APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FocusFlow-Signed-APK
          path: ${{ steps.sign_app.outputs.signedReleaseFile }}
